<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OBG Launcher</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b0d12;--panel:#141824;--card:#1a2033;
  --text:#e8ebff;--muted:#9aa4ff;--accent:#5b7cfa;
  --warn:#ffb454
}
*{box-sizing:border-box}
body{
  margin:0;font:14px system-ui;
  background:linear-gradient(180deg,#0b0d12,#0e1220);
  color:var(--text)
}
header{
  padding:14px 16px;
  display:flex;gap:10px;align-items:center;
  position:sticky;top:0;
  background:#0b0d12ee;
  backdrop-filter:blur(8px);
  border-bottom:1px solid #1d2340
}
h1{font-size:16px;margin:0;font-weight:600}
input{
  flex:1;padding:10px 12px;
  border-radius:10px;border:0;
  background:var(--panel);color:var(--text)
}
.badge{
  padding:6px 10px;border-radius:999px;
  font-size:12px;background:var(--panel);
  color:var(--muted)
}
main{
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  transition:.15s;
  box-shadow:0 6px 20px #00000030
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px #00000055
}
.card b{display:block;font-size:14px}
.card small{opacity:.75}
footer{
  padding:10px;
  text-align:center;
  font-size:12px;
  opacity:.7
}
#update{
  background:var(--warn);
  color:#000;
  padding:10px;
  text-align:center;
  font-weight:600;
  display:none
}
</style>
</head>

  <h1>OBG</h1>

verBadge.textContent = "v" + LAUNCHER_VERSION;

/* ===== VERSION COMPARE ===== */
function cmp(a,b){
  const pa=a.split(".").map(Number);
  const pb=b.split(".").map(Number);
  for(let i=0;i<3;i++){
    const d=(pa[i]||0)-(pb[i]||0);
    if(d) return d;
  }
  return 0;
}

/* ===== VERSION CHECK (SAFE) ===== */
fetch(VERSION_URL,{cache:"no-store"})
  .then(r=>r.ok ? r.text() : Promise.reject())
  .then(remote=>{
    if(cmp(LAUNCHER_VERSION, remote.trim()) < 0){
      update.style.display="block";
    }
  })

  });

const list=document.getElementById("list");
const q=document.getElementById("q");

function resolve(link){
  if (typeof link !== "string") {
    alert("Critical launch failure. Please redownload or update the launcher.");
    return null;
  }
  return link.startsWith("/")
    ? BASE_URL + link
    : BASE_URL + "/" + link;
}

function render(){
  const s = q.value.toLowerCase();
  list.innerHTML = "";

  games
    .filter(g => g.title && g["html-link"])
    .filter(g => g.title.toLowerCase().includes(s))
    .forEach(g => {
      const d = document.createElement("div");
      d.className = "card";
      d.innerHTML = `
        <b>${g.title}</b>
        <small>${g.cat}</small>
      `;
      d.onclick = () => {
        const url = resolve(g["html-link"]);
        if (url) window.open(url, "_blank");
      };
      list.appendChild(d);
    });
}

q.oninput=render;

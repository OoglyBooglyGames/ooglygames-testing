<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #screen {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas id="screen"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/jsnes@1.2.1/dist/jsnes.min.js"></script>
    <script>
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 240;

        const frameBuffer = ctx.createImageData(256, 240);

        const nes = new jsnes.NES({
            onFrame: function(buffer) {
                for (let i = 0; i < buffer.length; i++) {
                    frameBuffer.data[i * 4] = buffer[i] & 0xFF;
                    frameBuffer.data[i * 4 + 1] = (buffer[i] >> 8) & 0xFF;
                    frameBuffer.data[i * 4 + 2] = (buffer[i] >> 16) & 0xFF;
                    frameBuffer.data[i * 4 + 3] = 0xFF;
                }
                ctx.putImageData(frameBuffer, 0, 0);
            },
            onAudioSample: function(left, right) {}
        });

        const keyMap = {
            'ArrowUp': 0x04,
            'ArrowDown': 0x08,
            'ArrowLeft': 0x02,
            'ArrowRight': 0x01,
            'z': 0x80,
            'Z': 0x80,
            'x': 0x40,
            'X': 0x40,
            'Enter': 0x10,
            'Shift': 0x20
        };

        document.addEventListener('keydown', (e) => {
            if (keyMap[e.key]) {
                nes.buttonDown(1, keyMap[e.key]);
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (keyMap[e.key]) {
                nes.buttonUp(1, keyMap[e.key]);
                e.preventDefault();
            }
        });

        async function loadROM() {
            try {
                const response = await fetch('./kirby.nes');
                
                if (!response.ok) {
                    alert('ROM file not found. Please update the ROM path in the code.');
                    return;
                }
                
                const buffer = await response.arrayBuffer();
                
                if (buffer.byteLength === 0) {
                    alert('ROM file is empty.');
                    return;
                }
                
                nes.loadROM(new Uint8Array(buffer));
                requestAnimationFrame(frame);
            } catch (error) {
                alert('Error loading ROM: ' + error.message + '\n\nMake sure:\n1. The ROM file path is correct\n2. The file is a valid .nes ROM\n3. The file is accessible from your web server');
                console.error('ROM loading error:', error);
            }
        }

        function frame() {
            nes.frame();
            requestAnimationFrame(frame);
        }

        loadROM();
    </script>
</body>
</html>

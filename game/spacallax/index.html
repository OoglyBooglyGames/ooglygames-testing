<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacallax HTML5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 4/3;
            background: #0a0a14;
            cursor: none;
            border: 2px solid #333;
        }
        
        #ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            font-size: 16px;
            pointer-events: none;
            text-shadow: 2px 2px 2px black;
            z-index: 10;
        }
        
        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }
        
        .menu-box {
            background: rgba(0,0,0,0.85);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid cyan;
            color: white;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 30px cyan;
        }
        
        .menu-box h1 {
            color: cyan;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px cyan;
        }
        
        .difficulty-selector {
            margin: 30px 0;
        }
        
        .difficulty-btn {
            background: transparent;
            color: white;
            border: 2px solid yellow;
            padding: 15px 40px;
            font-size: 24px;
            margin: 0 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .difficulty-btn:hover {
            background: yellow;
            color: black;
        }
        
        .difficulty-btn.selected {
            background: yellow;
            color: black;
            box-shadow: 0 0 20px yellow;
        }
        
        .start-btn {
            background: limegreen;
            color: black;
            border: none;
            padding: 20px 60px;
            font-size: 32px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
        }
        
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px limegreen;
        }
        
        .game-over-box {
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid red;
            color: white;
            text-align: center;
        }
        
        .game-over-box h1 {
            color: red;
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .restart-hint {
            color: #ccc;
            margin-top: 20px;
            font-size: 18px;
        }
        
        .controls-hint {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #666;
            font-size: 12px;
            z-index: 5;
        }
        
        .color-hint {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #666;
            font-size: 12px;
            z-index: 5;
        }
        
        @media (max-width: 768px) {
            .menu-box h1 { font-size: 32px; }
            .difficulty-btn { padding: 10px 20px; font-size: 18px; }
            .start-btn { padding: 15px 40px; font-size: 24px; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-overlay"></div>
    
    <div id="menu-overlay"></div>
    
    <div class="controls-hint">
        Arrow Keys / WASD: Move | Space: Shoot | F11: Fullscreen | R: Restart (after game over)
    </div>
    
    <div class="color-hint">
        1: Green | 2: Blue | 3: Orange (changes player color)
    </div>

    <script src="game.js"></script>
</body>
</html>

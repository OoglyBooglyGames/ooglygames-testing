<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacallax 2.0.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: Arial, sans-serif; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; background: #0a0a14; cursor: none; }
        #ui-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; color: white; font-family: Arial, sans-serif;
        }
        .menu-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(10,10,20,0.9); pointer-events: auto;
        }
        .menu-title { color: cyan; font-size: clamp(28px,5vw,52px); margin-bottom: 40px; text-shadow: 0 0 10px cyan; letter-spacing: 2px; }
        .menu-prompt { color: white; font-size: clamp(16px,2.5vw,24px); margin-bottom: 20px; }
        .difficulty-display {
            color: yellow; font-size: clamp(20px,3vw,32px); margin: 20px 0;
            padding: 10px 40px; border: 2px solid yellow; border-radius: 10px;
            background: rgba(0,0,0,0.5); text-shadow: 0 0 10px yellow;
        }
        .menu-hint { color: #ccc; font-size: clamp(13px,1.8vw,18px); margin-top: 40px; text-align: center; line-height: 1.8; }
        .menu-hint kbd { background: #333; border: 1px solid #666; padding: 2px 8px; border-radius: 4px; color: yellow; }
        .game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .top-left { position: absolute; top: 10px; left: 10px; color: white; font-size: clamp(14px,2vw,20px); text-shadow: 2px 2px 2px black; }
        .top-right { position: absolute; top: 10px; right: 10px; text-align: right; text-shadow: 2px 2px 2px black; }
        .health-text { color: lightgreen; font-size: clamp(12px,1.5vw,16px); }
        .fps-text { color: yellow; font-size: clamp(12px,1.5vw,16px); }
        .difficulty-text { color: orange; font-size: clamp(12px,1.5vw,16px); }
        .fullscreen-hint { position: absolute; bottom: 10px; right: 10px; color: #666; font-size: 12px; }
        .color-hint { position: absolute; bottom: 10px; left: 10px; color: #666; font-size: 12px; }
        .gameover-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8);
        }
        .gameover-title { color: red; font-size: clamp(32px,5vw,52px); margin-bottom: 20px; text-shadow: 0 0 10px red; }
        .gameover-scores { color: white; font-size: clamp(16px,2.5vw,24px); margin: 10px 0; }
        .gameover-hint { color: #ccc; font-size: clamp(14px,2vw,20px); margin-top: 30px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-overlay"></div>

<script>
const GameState = { MENU: 0, PLAYING: 1, GAME_OVER: 2 };
const Difficulty = { EASY: 0, MEDIUM: 1, HARD: 2, INSANE: 3, UNBEATABLE: 4, BLIND_NIGHTMARE: 5 };
const difficultyNames = ["Easy","Medium","Hard","INSANE","UNBEATABLE!","BLIND NIGHTMARE"];

let canvas, ctx, overlay;
let width = window.innerWidth, height = window.innerHeight;
let currentState = GameState.MENU;
let currentDifficulty = Difficulty.MEDIUM;
let selectedDifficultyIndex = 1;

let player = {
    x: 0, y: 0, vx: 0, vy: 0,
    size: 40, speed: 400, bulletSpeed: 600,
    shootCooldown: 0, health: 3, invincibleTimer: 0,
    color: '#32CD32'
};

let enemies = [], playerBullets = [], enemyBullets = [], powerUps = [], particles = [], scorePopups = [], stars = [];
let enemySpawnTimer = 0, enemySpawnInterval = 0.4;
let powerUpSpawnTimer = 0, powerUpSpawnInterval = 5;
let score = 0, highScore = 0;
let enemyBaseSpeed = 200, enemySpeedMultiplier = 1, spawnIntervalMultiplier = 1;
let insaneMode = false, unbeatableMode = false, blindNightmare = false;
let shotCooldownTimer = 0;
const shotCooldownDuration = 5, blindShotCooldown = 2;
let rapidFireTimer = 0, shieldTimer = 0;
const rapidFireDuration = 5, shieldDuration = 5;
let shakeIntensity = 0, shakeDuration = 0;
let distortionTime = 0, distortionIntensity = 0;
const keys = {};
let lastTime = 0, deltaTime = 0, fps = 0, frameCount = 0, lastFpsUpdate = 0;

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    regenerateStars();
}

window.addEventListener('load', () => {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    overlay = document.getElementById('ui-overlay');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',
             'w','a','s','d','W','A','S','D','F11','r','R','1','2','3'].includes(e.key))
            e.preventDefault();
        if (e.key === 'F11') { e.preventDefault(); toggleFullscreen(); }
        if (currentState === GameState.PLAYING || currentState === GameState.MENU) {
            if (e.key === '1') player.color = '#32CD32';
            if (e.key === '2') player.color = '#00FFFF';
            if (e.key === '3') player.color = '#FFA500';
        }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });
    requestAnimationFrame(gameLoop);
});

function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen && document.exitFullscreen();
    setTimeout(resizeCanvas, 200);
}

function regenerateStars() {
    stars = [];
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * width, y: Math.random() * height,
            speed: 20 + Math.random() * 80,
            brightness: 0.3 + Math.random() * 0.7,
            size: 1 + Math.floor(Math.random() * 3)
        });
    }
}

function gameLoop(currentTime) {
    if (lastTime === 0) { lastTime = currentTime; requestAnimationFrame(gameLoop); return; }
    deltaTime = Math.min(0.05, (currentTime - lastTime) / 1000);
    lastTime = currentTime;
    frameCount++;
    if (currentTime - lastFpsUpdate >= 1000) { fps = frameCount; frameCount = 0; lastFpsUpdate = currentTime; }
    if (shakeDuration > 0) { shakeDuration -= deltaTime; if (shakeDuration <= 0) shakeIntensity = 0; }
    if (distortionIntensity > 0) distortionTime += deltaTime * 3;

    switch (currentState) {
        case GameState.MENU:     updateMenu();     break;
        case GameState.PLAYING:  updatePlaying();  break;
        case GameState.GAME_OVER:updateGameOver(); break;
    }
    updateStars();
    draw();
    updateUI();
    requestAnimationFrame(gameLoop);
}

function updateMenu() {
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        selectedDifficultyIndex = (selectedDifficultyIndex + 5) % 6;
        keys['ArrowLeft'] = keys['a'] = keys['A'] = false;
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        selectedDifficultyIndex = (selectedDifficultyIndex + 1) % 6;
        keys['ArrowRight'] = keys['d'] = keys['D'] = false;
    }
    if (keys[' '] || keys['Enter']) {
        currentDifficulty = selectedDifficultyIndex;
        startGame();
        keys[' '] = keys['Enter'] = false;
    }
}

function startGame() {
    insaneMode    = currentDifficulty === Difficulty.INSANE;
    unbeatableMode= currentDifficulty === Difficulty.UNBEATABLE;
    blindNightmare= currentDifficulty === Difficulty.BLIND_NIGHTMARE;

    let bSpeed = 600;
    switch (currentDifficulty) {
        case Difficulty.EASY:            enemyBaseSpeed = 150; enemySpawnInterval = 0.6;  bSpeed = 700;  break;
        case Difficulty.MEDIUM:          enemyBaseSpeed = 200; enemySpawnInterval = 0.4;  bSpeed = 600;  break;
        case Difficulty.HARD:            enemyBaseSpeed = 300; enemySpawnInterval = 0.25; bSpeed = 500;  break;
        case Difficulty.INSANE:          enemyBaseSpeed = 450; enemySpawnInterval = 0.15; bSpeed = 800;  break;
        case Difficulty.UNBEATABLE:      enemyBaseSpeed = 700; enemySpawnInterval = 0.08; bSpeed = 1000; break;
        case Difficulty.BLIND_NIGHTMARE: enemyBaseSpeed = 600; enemySpawnInterval = 0.1;  bSpeed = 1200; break;
    }

    const savedColor = player.color;
    player = {
        x: width / 2, y: height * 0.83,
        vx: 0, vy: 0, size: 40, speed: 400, bulletSpeed: bSpeed,
        shootCooldown: 0,
        health: (insaneMode || unbeatableMode || blindNightmare) ? 1 : 3,
        invincibleTimer: 0, color: savedColor
    };

    enemies = []; playerBullets = []; enemyBullets = [];
    powerUps = []; particles = []; scorePopups = [];
    enemySpawnTimer = 0; powerUpSpawnTimer = 0;
    enemySpeedMultiplier = 1; spawnIntervalMultiplier = 1;
    score = 0; rapidFireTimer = 0; shieldTimer = 0; shotCooldownTimer = 0;
    shakeIntensity = 0; shakeDuration = 0;
    distortionIntensity = blindNightmare ? 15 : 0;
    distortionTime = 0;
    currentState = GameState.PLAYING;
}

function updatePlaying() {
    if (rapidFireTimer > 0) rapidFireTimer -= deltaTime;
    if (shieldTimer > 0) shieldTimer -= deltaTime;
    if ((insaneMode || blindNightmare) && shotCooldownTimer > 0) shotCooldownTimer -= deltaTime;

    let currentFireCooldown = (rapidFireTimer > 0) ? 0.075 : 0.15;
    if (unbeatableMode) currentFireCooldown = 0.1;
    player.shootCooldown -= deltaTime;

    if (keys[' '] && player.shootCooldown <= 0) {
        let canShoot = true;
        if ((insaneMode || blindNightmare) && shotCooldownTimer > 0) {
            canShoot = false;
            scorePopups.push({ x: player.x, y: player.y - 30, text: `WAIT ${shotCooldownTimer.toFixed(1)}s`, life: 0.8, color: 'red' });
        }
        if (canShoot) {
            player.shootCooldown = currentFireCooldown;
            if (insaneMode) shotCooldownTimer = shotCooldownDuration;
            if (blindNightmare) shotCooldownTimer = blindShotCooldown;
            playerBullets.push({ x: player.x, y: player.y - player.size / 2 - 5, size: 6, active: true });
            for (let i = 0; i < 5; i++) {
                particles.push({ x: player.x, y: player.y - player.size / 2, vx: (Math.random()-0.5)*60, vy: -40-Math.random()*40, life: 0.3, color: 'rgba(255,255,100,0.8)' });
            }
        }
    }

    // Movement
    let moveX = 0, moveY = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveX -= 1;
    if (keys['ArrowRight']|| keys['d'] || keys['D']) moveX += 1;
    if (keys['ArrowUp']   || keys['w'] || keys['W']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) moveY += 1;
    if (moveX !== 0 || moveY !== 0) {
        const len = Math.sqrt(moveX*moveX + moveY*moveY);
        player.vx = (moveX/len) * player.speed;
        player.vy = (moveY/len) * player.speed;
    } else { player.vx = player.vy = 0; }
    player.x = Math.max(player.size/2, Math.min(width  - player.size/2, player.x + player.vx * deltaTime));
    player.y = Math.max(player.size/2, Math.min(height - player.size/2, player.y + player.vy * deltaTime));

    // Spawn enemies
    enemySpawnTimer += deltaTime;
    while (enemySpawnTimer >= enemySpawnInterval * spawnIntervalMultiplier) {
        enemySpawnTimer -= enemySpawnInterval * spawnIntervalMultiplier;
        enemies.push({
            x: Math.random() * (width - player.size) + player.size/2,
            y: -20, size: 35,
            speed: enemyBaseSpeed * enemySpeedMultiplier + (Math.random()*60-30),
            angle: 0,
            shootCooldown: 0.5 + Math.random() * 1.5
        });
    }

    // Spawn power-ups
    if (!insaneMode && !unbeatableMode && !blindNightmare) {
        powerUpSpawnTimer += deltaTime;
        while (powerUpSpawnTimer >= powerUpSpawnInterval) {
            powerUpSpawnTimer -= powerUpSpawnInterval;
            powerUps.push({ x: 20 + Math.random()*(width-40), y: -20, size: 16, type: Math.floor(Math.random()*3) });
        }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed * deltaTime;
        e.angle += 180 * deltaTime;
        if (insaneMode || unbeatableMode || blindNightmare) {
            e.shootCooldown -= deltaTime;
            const interval = (unbeatableMode || blindNightmare) ? 0.5 : 1.5;
            if (e.shootCooldown <= 0) {
                enemyBullets.push({ x: e.x, y: e.y + e.size/2, size: 6 });
                e.shootCooldown = interval * 0.8 + Math.random() * (interval * 0.4);
            }
        }
        if (e.y > height + 30) enemies.splice(i, 1);
    }

    // Player bullets
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.y -= player.bulletSpeed * deltaTime;
        if (b.y < -20) { playerBullets.splice(i, 1); continue; }
        let hit = false;
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            const dx = b.x - e.x, dy = b.y - e.y;
            if (Math.sqrt(dx*dx+dy*dy) < (b.size+e.size)/2) {
                enemies.splice(j, 1);
                hit = true;
                score += 10;
                scorePopups.push({ x: e.x, y: e.y-10, text: '+10', life: 1, color: 'yellow' });
                for (let k = 0; k < 15; k++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*400, vy: (Math.random()-0.5)*400, life: 0.8, color: 'rgba(255,100,0,0.8)' });
                enemySpeedMultiplier = Math.min(3, enemySpeedMultiplier + 0.02);
                spawnIntervalMultiplier = Math.max(0.3, spawnIntervalMultiplier - 0.01);
                break;
            }
        }
        if (hit) playerBullets.splice(i, 1);
    }

    // Enemy bullets
    const eBulletSpeed = (unbeatableMode || blindNightmare) ? 600 : 400;
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.y += eBulletSpeed * deltaTime;
        if (b.y > height + 20) { enemyBullets.splice(i, 1); continue; }
        if (shieldTimer <= 0 && player.invincibleTimer <= 0) {
            const dx = b.x - player.x, dy = b.y - player.y;
            if (Math.sqrt(dx*dx+dy*dy) < (b.size+player.size)/2) {
                player.health--;
                player.invincibleTimer = 1.2;
                enemyBullets.splice(i, 1);
                shakeIntensity = 10; shakeDuration = 0.3;
                for (let k = 0; k < 15; k++) particles.push({ x: b.x, y: b.y, vx: (Math.random()-0.5)*400, vy: (Math.random()-0.5)*400, life: 1, color: 'rgba(255,0,255,0.8)' });
                if (player.health <= 0) { currentState = GameState.GAME_OVER; if (score > highScore) highScore = score; }
            }
        }
    }

    // Power-ups
    for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        p.y += 100 * deltaTime;
        if (p.y > height + 30) { powerUps.splice(i, 1); continue; }
        const dx = p.x - player.x, dy = p.y - player.y;
        if (Math.sqrt(dx*dx+dy*dy) < (p.size+player.size)/2) {
            if (p.type === 0) {
                player.health = Math.min(3, player.health + 1);
                scorePopups.push({ x: p.x, y: p.y, text: '+HEALTH', life: 1, color: 'lime' });
            } else if (p.type === 1) {
                rapidFireTimer = rapidFireDuration;
                scorePopups.push({ x: p.x, y: p.y, text: 'RAPID FIRE!', life: 1, color: 'orange' });
            } else {
                shieldTimer = shieldDuration;
                scorePopups.push({ x: p.x, y: p.y, text: 'SHIELD!', life: 1, color: 'cyan' });
            }
            for (let k = 0; k < 8; k++) particles.push({ x: p.x, y: p.y, vx: (Math.random()-0.5)*200, vy: (Math.random()-0.5)*200, life: 0.6, color: 'white' });
            powerUps.splice(i, 1);
        }
    }

    // Player-enemy collision
    if (shieldTimer <= 0) {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            const dx = e.x - player.x, dy = e.y - player.y;
            if (Math.sqrt(dx*dx+dy*dy) < (e.size+player.size)/2 && player.invincibleTimer <= 0) {
                player.health--;
                player.invincibleTimer = 1.2;
                enemies.splice(i, 1);
                shakeIntensity = 15; shakeDuration = 0.4;
                for (let k = 0; k < 20; k++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*600, vy: (Math.random()-0.5)*600, life: 1, color: 'red' });
                if (player.health <= 0) { currentState = GameState.GAME_OVER; if (score > highScore) highScore = score; }
                break;
            }
        }
    }

    if (player.invincibleTimer > 0) player.invincibleTimer -= deltaTime;
    score += Math.floor(deltaTime * 10);

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * deltaTime; p.y += p.vy * deltaTime;
        p.life -= deltaTime * 2;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = scorePopups.length - 1; i >= 0; i--) {
        const s = scorePopups[i];
        s.y -= 30 * deltaTime; s.life -= deltaTime * 2;
        if (s.life <= 0) scorePopups.splice(i, 1);
    }
}

function updateGameOver() {
    if (keys['r'] || keys['R']) { currentState = GameState.MENU; keys['r'] = keys['R'] = false; }
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * deltaTime; p.y += p.vy * deltaTime;
        p.life -= deltaTime * 2;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function updateStars() {
    for (const star of stars) {
        star.y += star.speed * deltaTime;
        if (star.y > height) { star.y = 0; star.x = Math.random() * width; }
    }
}

function draw() {
    ctx.save();
    if (shakeDuration > 0) {
        ctx.translate((Math.random()*2-1)*shakeIntensity, (Math.random()*2-1)*shakeIntensity);
    }
    if (blindNightmare && distortionIntensity > 0) {
        const t = distortionTime;
        ctx.translate(Math.sin(t*2)*15+Math.sin(t*1.3)*10, Math.cos(t*1.7)*15+Math.sin(t*2.5)*10);
        ctx.rotate(Math.sin(t*1.2)*3*Math.PI/180);
        ctx.scale(1+Math.sin(t*3)*0.05, 1+Math.sin(t*3)*0.05);
    }

    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, width, height);

    // Stars
    for (const star of stars) {
        const b = Math.floor(255 * star.brightness);
        ctx.fillStyle = `rgb(${b},${b},${b})`;
        ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    // Particles
    ctx.globalAlpha = 1;
    for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Power-ups
    for (const pu of powerUps) {
        ctx.fillStyle = pu.type === 0 ? 'lime' : pu.type === 1 ? 'orange' : 'cyan';
        ctx.beginPath();
        ctx.moveTo(pu.x, pu.y - pu.size/2);
        ctx.lineTo(pu.x + pu.size/2, pu.y);
        ctx.lineTo(pu.x, pu.y + pu.size/2);
        ctx.lineTo(pu.x - pu.size/2, pu.y);
        ctx.closePath();
        ctx.fill();
    }

    // Player bullets
    ctx.fillStyle = 'yellow';
    for (const b of playerBullets) ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);

    // Enemy bullets
    ctx.fillStyle = 'magenta';
    for (const b of enemyBullets) ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);

    // Enemies (hexagons)
    ctx.fillStyle = 'red';
    for (const e of enemies) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = i * Math.PI/3 + e.angle * Math.PI/180;
            const x = e.x + Math.cos(angle) * e.size/2;
            const y = e.y + Math.sin(angle) * e.size/2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
    }

    // Player
    if (currentState === GameState.PLAYING) {
        const drawPlayer = !(player.invincibleTimer > 0 && Math.floor(player.invincibleTimer * 10) % 2 === 0);
        if (shieldTimer > 0) {
            ctx.strokeStyle = 'cyan'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size * 0.8, 0, Math.PI*2);
            ctx.stroke();
        }
        if (drawPlayer) {
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size);
            ctx.lineTo(player.x + player.size*0.8, player.y + player.size*0.5);
            ctx.lineTo(player.x - player.size*0.8, player.y + player.size*0.5);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Score popups
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    for (const sp of scorePopups) {
        ctx.globalAlpha = Math.max(0, sp.life);
        ctx.fillStyle = sp.color;
        ctx.fillText(sp.text, sp.x, sp.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    ctx.restore();
}

function updateUI() {
    let html = '';
    if (currentState === GameState.MENU) {
        html = `
        <div class="menu-container">
            <div class="menu-title">SPACALLAX 2.0.0</div>
            <div class="menu-prompt">Select Difficulty:</div>
            <div class="difficulty-display">${difficultyNames[selectedDifficultyIndex]}</div>
            <div class="menu-hint">
                <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> to select<br>
                <kbd>SPACE</kbd> or <kbd>ENTER</kbd> to start<br>
                <kbd>F11</kbd> Fullscreen &nbsp; <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> Change color
            </div>
        </div>`;
    } else if (currentState === GameState.PLAYING) {
        const healthText = (insaneMode || unbeatableMode || blindNightmare)
            ? `Health: ${player.health}/1` : `Health: ${player.health}/3`;
        let cooldownText = '';
        if (insaneMode) {
            cooldownText = shotCooldownTimer > 0
                ? `<div style="color:magenta;font-size:14px">Shot ready in: ${shotCooldownTimer.toFixed(1)}s</div>`
                : `<div style="color:green;font-size:14px">Shot ready!</div>`;
        }
        if (blindNightmare) {
            cooldownText = shotCooldownTimer > 0
                ? `<div style="color:magenta;font-size:14px">Blind shot: ${shotCooldownTimer.toFixed(1)}s</div>`
                : `<div style="color:green;font-size:14px">Blind shot ready!</div>`;
        }
        if (unbeatableMode) cooldownText = `<div style="color:red;font-size:16px">GOOD LUCK</div>`;
        let powerupText = '';
        if (rapidFireTimer > 0) powerupText += `<div style="color:orange;font-size:12px">Rapid Fire: ${rapidFireTimer.toFixed(1)}s</div>`;
        if (shieldTimer > 0)    powerupText += `<div style="color:cyan;font-size:12px">Shield: ${shieldTimer.toFixed(1)}s</div>`;
        html = `
        <div class="game-ui">
            <div class="top-left">
                <div>Score: ${score} &nbsp; High Score: ${highScore}</div>
                <div class="health-text">${healthText}</div>
                <div class="fps-text">FPS: ${fps}</div>
            </div>
            <div class="top-right">
                <div class="difficulty-text">Difficulty: ${difficultyNames[currentDifficulty]}</div>
                ${cooldownText}${powerupText}
            </div>
            <div class="fullscreen-hint">F11: Fullscreen</div>
            <div class="color-hint">1: Green &nbsp; 2: Cyan &nbsp; 3: Orange</div>
        </div>`;
    } else if (currentState === GameState.GAME_OVER) {
        html = `
        <div class="gameover-container">
            <div class="gameover-title">GAME OVER</div>
            <div class="gameover-scores">Your Score: ${score}</div>
            <div class="gameover-scores">High Score: ${highScore}</div>
            <div class="gameover-hint">Press R to return to menu</div>
        </div>`;
    }
    overlay.innerHTML = html;
}
</script>
</body>
</html>

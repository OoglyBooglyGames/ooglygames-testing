<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacallax 2.0.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: #0a0a14;
            cursor: none;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,255,255,0.3);
        }
        
        /* UI Overlay - positioned absolutely over canvas */
        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 600px;
            pointer-events: none;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        
        /* Menu container */
        .menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 20, 0.9);
            pointer-events: auto;
        }
        
        .menu-title {
            color: cyan;
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px cyan;
            letter-spacing: 2px;
        }
        
        .menu-prompt {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .difficulty-display {
            color: yellow;
            font-size: 32px;
            margin: 20px 0;
            padding: 10px 40px;
            border: 2px solid yellow;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            text-shadow: 0 0 10px yellow;
        }
        
        .menu-hint {
            color: #ccc;
            font-size: 18px;
            margin-top: 40px;
            text-align: center;
            line-height: 1.8;
        }
        
        .menu-hint kbd {
            background: #333;
            border: 1px solid #666;
            padding: 2px 8px;
            border-radius: 4px;
            color: yellow;
        }
        
        /* Game UI elements */
        .game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .top-left {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 2px black;
        }
        
        .top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            text-align: right;
            text-shadow: 2px 2px 2px black;
        }
        
        .health-text {
            color: lightgreen;
            font-size: 16px;
        }
        
        .fps-text {
            color: yellow;
            font-size: 16px;
        }
        
        .difficulty-text {
            color: orange;
            font-size: 16px;
        }
        
        .cooldown-text {
            color: magenta;
            font-size: 14px;
        }
        
        .ready-text {
            color: green;
            font-size: 14px;
        }
        
        .good-luck {
            color: red;
            font-size: 16px;
        }
        
        .powerup-text {
            font-size: 12px;
        }
        
        .fullscreen-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #666;
            font-size: 12px;
        }
        
        .color-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #666;
            font-size: 12px;
        }
        
        /* Game over screen */
        .gameover-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.8);
            pointer-events: none;
        }
        
        .gameover-title {
            color: red;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px red;
        }
        
        .gameover-scores {
            color: white;
            font-size: 24px;
            margin: 10px 0;
        }
        
        .gameover-hint {
            color: #ccc;
            font-size: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>

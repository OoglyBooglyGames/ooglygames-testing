  margin: 0;

  height: 100%;
  overflow: hidden;

#myIframe {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  border: none;
  z-index: 1;
}

/* Covers the Replit pill in the bottom-right corner */
#replit-hider {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 220px;
  height: 80px;
  background: #0e0e0e;
  z-index: 999;
  pointer-events: all; /* blocks clicks reaching the Replit pill in the iframe */
}
</style>
</head>
<body>

<iframe id="myIframe" src="https://oogly-chat--ooglychat.replit.app"></iframe>

<!-- Covers the Replit pill badge in the bottom-right -->

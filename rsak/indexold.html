<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="./rsak/style.css" />
    <title>OBG</title>
    <!-- Yandex Games SDK -->
    <script src="/sdk.js"></script>
    <style>
        /* Убираем выделение по нажатию клавиш */
        canvas:focus {
            outline: none;
        }

        html, body {
            /* Убираем отступы */
            padding: 0;
            margin: 0;
            /* Отключаем скролл и лонгтап на IOS */
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
            /* Ставим высоту на 100% */
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #unity-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        #unity-container.unity-desktop {
            width: 100%;
            height: 100%;
        }

        #unity-container.unity-mobile {
            width: 100%;
            height: 100%;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #231F20;
        }

        #loading-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('background.jpg') center / cover;
            z-index: 100;
        }

        #unity-loading-bar {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80%;
            max-width: 400px;
        }

        #unity-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        #unity-logo img {
            max-width: 200px;
            height: auto;
        }

        #unity-progress-bar-empty {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            position: relative;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #4CAF50;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        body.dark {
            background-color: #000;
        }
    </style>
</head>
<body class="dark">
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-cover" style="display: none">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="logo.png" alt="Logo" /></div>
            <div id="unity-progress-bar-empty" style="display: none">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        // Показываем загрузочный экран
        const loadingCover = document.querySelector("#loading-cover");
        loadingCover.style.display = "flex";

        // Конфигурация сборки
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/yandexGames.loader.js";
        const config = {
            dataUrl: buildUrl + "/yandexGames.data.br",
            frameworkUrl: buildUrl + "/yandexGames.framework.js.br",
            codeUrl: "https://pub-2d868f15a1824cc8a2ec51069ed41c6f.r2.dev/race_survival_arena_king_yandexGames.wasm.br",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Brain massage",
            productName: "Supercars Battle 3D",
            productVersion: "0.0.204",
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const spinner = document.querySelector(".spinner");

        // Определение мобильного устройства
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            container.className = "unity-mobile";
        }

        // Отключаем контекстное меню
        document.addEventListener("contextmenu", (event) => event.preventDefault());

        // Функция фокуса
        function FocusGame() {
            window.focus();
            canvas.focus();
        }

        window.addEventListener("pointerdown", FocusGame);
        window.addEventListener("touchstart", FocusGame);

        // Переменные для SDK
        let myGameInstance = null;
        let ysdk = null;
        let player = null;
        let payments = null;
        let initGame = false;
        let nowFullAdOpen = false;

        // Обработка видимости страницы
        document.addEventListener("visibilitychange", function() {
            if (ysdk !== null && initGame == true) {
                if (document.hidden) {
                    if (myGameInstance) {
                        myGameInstance.SendMessage("YandexGame", "OnVisibilityGameWindow", "false");
                    }
                } else {
                    if (myGameInstance) {
                        myGameInstance.SendMessage("YandexGame", "OnVisibilityGameWindow", "true");
                    }
                    if ((ysdk.deviceInfo.isMobile() || ysdk.deviceInfo.isTablet()) && 
                        ysdk.screen.fullscreen.status == "off") {
                        ysdk.screen.fullscreen.request();
                    }
                }
            }
        });

        // Загрузка Unity
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            window.createUnityInstance(canvas, config, (progress) => {
                spinner.style.display = "none";
                progressBarEmpty.style.display = "block";
                progressBarFull.style.width = `${100 * progress}%`;
            })
            .then((unityInstance) => {
                myGameInstance = unityInstance;
                loadingCover.style.display = "none";
                
                // Принудительно устанавливаем размер canvas
                canvas.style.width = "100%";
                canvas.style.height = "100%";
                
                // Отправляем сообщение о успешной инициализации
                setTimeout(() => {
                    if (myGameInstance) {
                        myGameInstance.SendMessage("YandexGame", "GetDataInvoke");
                    }
                }, 1000);
            })
            .catch((message) => {
                console.error("Unity initialization error:", message);
                loadingCover.innerHTML = '<div style="color: white; text-align: center;">Failed to load game. Please refresh.</div>';
            });
        };

        document.body.appendChild(script);

        // Инициализация Yandex SDK
        async function InitYSDK() {
            try {
                console.log("Init Yandex SDK");
                ysdk = await YaGames.init();
                
                // Инициализация компонентов
                await InitPlayer();
                await GetPayments();
                InitLeaderboards();
                await RequestingEnvironmentData();
                
                initGame = true;
                console.log("Init Game Success");
                
                if (nowFullAdOpen == true && myGameInstance != null) {
                    myGameInstance.SendMessage("YandexGame", "OpenFullAd");
                }
            } catch (e) {
                console.error("CRASH Initialization SDK: ", e);
            }
        }

        // Функции Yandex SDK
        function InitPlayer(sendback) {
            return new Promise((resolve) => {
                if (ysdk == null) {
                    resolve(NotAuthorized());
                    return;
                }
                
                ysdk.getPlayer({ scopes: true })
                    .then((_player) => {
                        player = _player;
                        
                        let authJson = {
                            playerAuth: "resolved",
                            playerName: player.getName() || "anonymous",
                            playerId: player.getUniqueID(),
                            playerPhoto: player.getPhoto("small") || "unknown",
                            payingStatus: player.getPayingStatus(),
                        };
                        
                        if (sendback && myGameInstance) {
                            myGameInstance.SendMessage("YandexGame", "SetInitializationSDK", JSON.stringify(authJson));
                        }
                        resolve(JSON.stringify(authJson));
                    })
                    .catch(() => {
                        resolve(NotAuthorized());
                    });
            });
        }

        function NotAuthorized() {
            let authJson = {
                playerAuth: "rejected",
                playerName: "unauthorized",
                playerId: "unauthorized",
                playerPhoto: "unknown",
                payingStatus: "unknown",
            };
            return JSON.stringify(authJson);
        }

        function InitLeaderboards() {
            if (ysdk) {
                ysdk.getLeaderboards().then((_lb) => {
                    window.leaderboard = _lb;
                });
            }
        }

        function GetPayments() {
            return new Promise((resolve) => {
                if (ysdk == null) {
                    resolve("none");
                    return;
                }
                
                ysdk.getPayments()
                    .then((_payments) => {
                        payments = _payments;
                        resolve("payments_initialized");
                    })
                    .catch(() => {
                        resolve("none");
                    });
            });
        }

        function RequestingEnvironmentData() {
            return new Promise((resolve) => {
                if (ysdk == null) {
                    resolve("null");
                    return;
                }
                
                let jsonEnvir = {
                    language: ysdk.environment.i18n.lang,
                    domain: ysdk.environment.i18n.tld,
                    deviceType: ysdk.deviceInfo.type,
                    isMobile: ysdk.deviceInfo.isMobile(),
                    isDesktop: ysdk.deviceInfo.isDesktop(),
                    isTablet: ysdk.deviceInfo.isTablet(),
                    appID: ysdk.environment.app.id,
                    browserLang: ysdk.environment.browser.lang,
                };
                resolve(JSON.stringify(jsonEnvir));
            });
        }

        // Запускаем инициализацию SDK
        InitYSDK();

        // Google Analytics
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-53Q9XR4QZK');
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-53Q9XR4QZK"></script>
</body>
</html>
